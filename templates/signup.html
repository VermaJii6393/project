<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="ask">

<!-- ================= LOADING SCREEN ================= -->
<div id="loading-screen">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Loading Logo">
</div>

<div class="chat-container">

    <h2>📝 Signup</h2>

    <form method="POST">

        <input type="text" name="name" placeholder="Full Name" required><br><br>

        <input type="email" name="email" placeholder="Email" required><br><br>

        <!-- OPTIONAL INFO (NOT SAVED IN DB, JUST UI) -->
        <input type="text" name="number" placeholder="Phone Number"><br><br>

        <input type="text" name="branch" placeholder="Branch"><br><br>

        <select name="role" required>
            <option value="fresher">Fresher</option>
            <option value="senior">Senior</option>
            <option value="teacher">Teacher</option>
        </select><br><br>

        <input type="text" name="id_card" placeholder="ID Card Number (Optional)"><br><br>

        <input type="password" name="password" placeholder="Password" required><br><br>

        <button type="submit">Create Account</button>

    </form>

</div>

<!-- ================= LOADING SCRIPT ================= -->
<script>
    window.addEventListener("load", function () {
        setTimeout(function () {
            let loader = document.getElementById("loading-screen");
            if (loader) {
                loader.style.display = "none";
            }
        }, 1500);
    });
</script>

</body>
</html>
