<!DOCTYPE html>
<html>
<head>
    <title>Connect</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="connect">

<a href="/" class="btn">⬅ Back</a>

<div class="connect-container">

    <h2>👥 Connect Hub</h2>

    <!-- SENIORS + TEACHERS (DYNAMIC FROM DATABASE) -->
    <div class="section">
        <h3>🎓 Seniors & Teachers</h3>

        <div class="card-container">

            {% if users %}

                {% for user in users %}
                <div class="card">
                    <img src="{{ url_for('static', filename='user.png') }}">

                    <p>
                        {{ user[0] }}<br>
                        <small>{{ user[1] }}</small>
                    </p>
                </div>
                {% endfor %}

            {% else %}
                <p>No users available yet.</p>
            {% endif %}

        </div>
    </div>

</div>

</body>
</html>
