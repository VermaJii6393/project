<!DOCTYPE html>
<html>
<head>
    <title>Connect Hub</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="connect">

<!-- ================= LOADING SCREEN ================= -->
<div id="loading-screen">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Loading Logo">
</div>

<a href="/" class="btn">⬅ Back</a>

<div class="connect-container">

    <h2>👥 Connect Hub</h2>

    <!-- ================= FRESHER COUNT ================= -->
    <div class="section">
        <div class="card-container">

            <div class="card">
                <h3>👨‍🎓 Freshers</h3>
                <p>{{ fresher_count }}</p>
            </div>

        </div>
    </div>

    <!-- ================= SENIORS ================= -->
    <div class="section">
        <h3>🎓 Seniors</h3>

        <div class="card-container">

            <div class="card">
                <img src="{{ url_for('static', filename='user.png') }}">
                <p>Rahul Kumar Yadav<br><small>Senior</small></p>
            </div>

            <div class="card">
                <img src="{{ url_for('static', filename='user.png') }}">
                <p>Vaibhav Jaiswal<br><small>Senior</small></p>
            </div>

            <div class="card">
                <img src="{{ url_for('static', filename='user.png') }}">
                <p>Ganga Sagar Pandey<br><small>Senior</small></p>
            </div>

        </div>
    </div>

    <!-- ================= TEACHERS ================= -->
    <div class="section">
        <h3>📘 Teachers</h3>

        <div class="card-container">

            <div class="card">
                <img src="{{ url_for('static', filename='user.png') }}">
                <p>U.S Shukla<br><small>Teacher</small></p>
            </div>

            <div class="card">
                <img src="{{ url_for('static', filename='user.png') }}">
                <p>Akhilesh Kumar Maurya<br><small>Teacher</small></p>
            </div>

            <div class="card">
                <img src="{{ url_for('static', filename='user.png') }}">
                <p>Dr. Anjali Awasthi<br><small>Teacher</small></p>
            </div>

        </div>
    </div>

</div>

<!-- ================= LOADING SCRIPT ================= -->
<script>
    window.addEventListener("load", function () {
        setTimeout(function () {
            let loader = document.getElementById("loading-screen");
            if (loader) {
                loader.style.display = "none";
            }
        }, 1500);
    });
</script>

</body>
</html>
