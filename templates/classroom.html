<!DOCTYPE html>
<html>
<head>
    <title>Classroom Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="classroom">

<a href="/" class="btn">⬅ Back</a>

<div class="chat-container">

    <h2>🏫 Classroom Chat Room</h2>

    <div class="chat-box">

        {% for msg in messages %}
            <div class="message bot">
                {{ msg }}
            </div>
        {% endfor %}

    </div>

    <form method="POST" action="/send_message" class="input-area">
        <input type="text" name="message" placeholder="Write message..." required>
        <button type="submit">Send</button>
    </form>

</div>

</body>
</html>
