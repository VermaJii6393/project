<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fresher_Drive</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="home">

<div class="container">

    <h1>🎓 BBD College Help System</h1>
    <p>Your smart assistant for college life</p>

    <!-- 👤 USER INFO -->
    {% if user %}
        <p>👋 Welcome, <b>{{ user }}</b> ({{ role }})</p>
    {% endif %}

    <div class="buttons">

        <!-- 🔼 TOP SECTION: LOGIN / SIGNUP -->
        <div class="auth-box">

            {% if user %}
                <a href="/logout" class="btn">🚪 Logout</a>
            {% else %}
                <a href="/signup" class="btn">📝 Signup</a>
                <a href="/login" class="btn">🔐 Login</a>
            {% endif %}

        </div>

        <!-- 🔽 BOTTOM SECTION: FEATURES -->
        <div class="feature-box">

            <a href="/ask" class="btn">🤖 Ask AI</a>
            <a href="/connect" class="btn">👥 Connect</a>
            <a href="/classroom" class="btn">🏫 Class Chat</a>

        </div>

    </div>

</div>

</body>
</html>
